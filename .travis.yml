language: node_js
node_js:
  - "0.10"
sudo: false
branches:
  only:
    - master
cache:
  directories:
    - node_modules
install:
  - npm install
script:
  - npm run lint
  - npm test
  - npm run build
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GH_TOKEN
  keep_history: true
  local_dir: dist
  on:
    branch: master
